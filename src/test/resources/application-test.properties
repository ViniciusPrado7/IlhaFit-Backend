spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/ilhafit?currentSchema=ilhafit_test}
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=CREATE SCHEMA IF NOT EXISTS ilhafit_test

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.jwt.secret=${TEST_JWT_SECRET:ilhaFitJwtSecretKeyForIntegrationTestsOnly1234567890}
app.jwt.expiration-millis=86400000
app.frontend.reset-password-url=http://localhost:5173/esqueci-senha

admin.default.nome=Admin Teste
admin.default.email=${TEST_ADMIN_EMAIL:admin.test@ilhafit.com}
admin.default.senha=${TEST_ADMIN_PASSWORD:Adm@Test123}

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=test@ilhafit.local
