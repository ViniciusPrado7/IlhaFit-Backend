spring.application.name=backend

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600
spring.messages.fallback-to-system-locale=false

spring.datasource.url=jdbc:postgresql://localhost:5432/ilhafit
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:ilhaFitJwtSecretKeyForDevelopmentOnlyChangeInProduction123456}
app.jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:86400000}

admin.default.nome=${ADMIN_NOME:Admin}
admin.default.email=${ADMIN_EMAIL:admin@ilhafit.com}
admin.default.senha=${ADMIN_SENHA:Adm@1234}

groq.moderation.model=llama-3.3-70b-versatile

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.from=${MAIL_FROM:${MAIL_USER:no-reply@ilhafit.com}}
