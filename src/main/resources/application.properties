spring.application.name=backend
server.port=${PORT:8080}

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600
spring.messages.fallback-to-system-locale=false

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ilhafit}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:ilhaFitJwtSecretKeyForDevelopmentOnlyChangeInProduction123456}
app.jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:86400000}

admin.default.nome=${ADMIN_NOME:Admin}
admin.default.email=${ADMIN_EMAIL:admin@ilhafit.com}
admin.default.senha=${ADMIN_SENHA:Adm@1234}

groq.moderation.model=llama-3.3-70b-versatile
