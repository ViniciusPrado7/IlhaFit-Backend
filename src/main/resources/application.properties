spring.application.name=backend

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600
spring.messages.fallback-to-system-locale=false

spring.datasource.url=jdbc:postgresql://localhost:5432/ilhafit
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:ilhaFitJwtSecretKeyForDevelopmentOnlyChangeInProduction123456}
app.jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:86400000}

admin.default.nome=${ADMIN_NOME:Admin}
admin.default.email=${ADMIN_EMAIL:admin@ilhafit.com}
admin.default.senha=${ADMIN_SENHA:Adm@1234}

groq.moderation.model=llama-3.3-70b-versatile
