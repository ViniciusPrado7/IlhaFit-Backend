services:
  postgres:
    image: postgres:15-alpine
    container_name: ilhafit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ilhafit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - ilhafit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ilhafit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: ilhafit_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ilhafit
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      MAIL_USER: ${MAIL_USER:-illhafiit@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-jbqv kmsc lxqu hbem}
      MAIL_FROM: ${MAIL_FROM:-illhafiit@gmail.com}
      JWT_SECRET: ilhaFitJwtSecretKeyForDevelopmentOnlyChangeInProduction123456
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ilhafit_data:
